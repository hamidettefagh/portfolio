<!-- @dsCard group="Type" viewport="700x210" name="Serif accent" subtitle="Newsreader italic, one word per headline" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 24px 20px; }
  h1 { font-family: var(--font-display); font-weight: var(--weight-display); font-size: 64px; letter-spacing: var(--tracking-display); line-height: var(--leading-display); margin: 0; }
  em { font-family: var(--font-serif); font-style: italic; font-weight: var(--serif-accent-weight); color: var(--text-accent); letter-spacing: -0.01em; text-decoration: underline; text-decoration-thickness: var(--underline-thickness-hero); text-underline-offset: var(--underline-offset); text-decoration-color: var(--accent-500); }
  .meta { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.05em; color: var(--text-meta); text-transform: uppercase; margin-top: 20px; }
</style>
</head>
<body>
<h1>Built for <em>production</em></h1>
<div class="meta">Newsreader italic 500 &middot; accent + underline &middot; max once per screen</div>
</body>
</html>
