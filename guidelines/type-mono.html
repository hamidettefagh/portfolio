<!-- @dsCard group="Type" viewport="700x170" name="Mono meta" subtitle="Geist Mono, uppercase, 0.08em tracking" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; display: grid; gap: 16px; }
  .eyebrow { font-family: var(--font-mono); font-size: var(--text-mono); letter-spacing: var(--tracking-mono); text-transform: uppercase; color: var(--text-meta); display: inline-flex; align-items: center; gap: 10px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-500); }
  .tag { font-family: var(--font-mono); font-size: var(--text-mono-sm); letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); border: 1px solid var(--border-hairline); border-radius: var(--radius-pill); padding: 5px 11px; display: inline-flex; }
  .row { display: flex; gap: 20px; align-items: center; }
</style>
</head>
<body>
<span class="eyebrow"><span class="dot"></span>Portfolio, 2026 &middot; Forward deployed</span>
<div class="row">
  <span class="tag">Major US airline</span>
  <span class="tag">National telecom carrier</span>
  <span class="tag">Global dining platform</span>
</div>
</body>
</html>
