<!-- @dsCard group="Spacing" viewport="700x330" name="Scale" subtitle="4px base, 13 steps" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 16px 24px; }
  .row { display: grid; grid-template-columns: 110px 1fr; align-items: center; gap: 16px; padding: 4px 0; }
  .k { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.05em; color: var(--text-meta); text-transform: uppercase; }
  .bar { height: 14px; background: var(--accent-100); border-left: 2px solid var(--accent-500); }
</style>
</head>
<body>
<div class="row"><span class="k">space-1 &middot; 4</span><div class="bar" style="width: 4px;"></div></div>
<div class="row"><span class="k">space-2 &middot; 8</span><div class="bar" style="width: 8px;"></div></div>
<div class="row"><span class="k">space-3 &middot; 12</span><div class="bar" style="width: 12px;"></div></div>
<div class="row"><span class="k">space-4 &middot; 16</span><div class="bar" style="width: 16px;"></div></div>
<div class="row"><span class="k">space-5 &middot; 20</span><div class="bar" style="width: 20px;"></div></div>
<div class="row"><span class="k">space-6 &middot; 24</span><div class="bar" style="width: 24px;"></div></div>
<div class="row"><span class="k">space-7 &middot; 32</span><div class="bar" style="width: 32px;"></div></div>
<div class="row"><span class="k">space-8 &middot; 40</span><div class="bar" style="width: 40px;"></div></div>
<div class="row"><span class="k">space-9 &middot; 48</span><div class="bar" style="width: 48px;"></div></div>
<div class="row"><span class="k">space-10 &middot; 64</span><div class="bar" style="width: 64px;"></div></div>
<div class="row"><span class="k">space-11 &middot; 96</span><div class="bar" style="width: 96px;"></div></div>
<div class="row"><span class="k">space-12 &middot; 128</span><div class="bar" style="width: 128px;"></div></div>
<div class="row"><span class="k">space-13 &middot; 176</span><div class="bar" style="width: 176px;"></div></div>
</body>
</html>
