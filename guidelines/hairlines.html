<!-- @dsCard group="Effects" viewport="700x200" name="Hairlines" subtitle="Rules separate, boxes are rare" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; display: grid; gap: 22px; align-content: start; }
  .rule { border-top: 1px solid var(--border-hairline); }
  .rule-strong { border-top: 1px solid var(--border-strong); }
  .labeled { display: flex; align-items: center; gap: 16px; }
  .labeled .k { font-family: var(--font-mono); font-size: var(--text-mono); letter-spacing: var(--tracking-mono); text-transform: uppercase; color: var(--text-accent); }
  .labeled .line { flex: 1; border-top: 1px solid var(--border-hairline); }
  .ticker { border-top: 1px solid var(--border-strong); border-bottom: 1px solid var(--border-strong); padding: 13px 0; display: flex; gap: 32px; align-items: center; }
  .ticker .k { font-family: var(--font-mono); font-size: var(--text-mono); letter-spacing: var(--tracking-mono); text-transform: uppercase; color: var(--text-accent); display: inline-flex; align-items: center; gap: 8px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); }
  .ticker .item { font-family: var(--font-mono); font-size: var(--text-mono); letter-spacing: 0.04em; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="rule"></div>
<div class="labeled"><span class="k">Selected work</span><span class="line"></span></div>
<div class="ticker">
  <span class="k"><span class="dot"></span>Now</span>
  <span class="item">Shipping enterprise agent platforms</span>
  <span class="item">Advising on AI trust and governance</span>
</div>
</body>
</html>
