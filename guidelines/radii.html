<!-- @dsCard group="Effects" viewport="700x160" name="Radii" subtitle="Square by default, pills for interactive chips" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; }
  .row { display: flex; gap: 28px; align-items: flex-end; }
  .shape { background: var(--surface-inset); border: 1px solid var(--border-strong); height: 64px; width: 130px; display: flex; align-items: center; justify-content: center; }
  .k { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.05em; color: var(--text-meta); text-transform: uppercase; }
</style>
</head>
<body>
<div class="row">
  <div class="shape" style="border-radius: 0;"><span class="k">0 &middot; sections</span></div>
  <div class="shape" style="border-radius: var(--radius-sm);"><span class="k">sm &middot; 6</span></div>
  <div class="shape" style="border-radius: var(--radius-md);"><span class="k">md &middot; 12</span></div>
  <div class="shape" style="border-radius: var(--radius-pill);"><span class="k">pill &middot; 999</span></div>
</div>
</body>
</html>
