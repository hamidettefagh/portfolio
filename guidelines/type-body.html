<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; }
  .lead { font-size: var(--text-lead); line-height: 1.45; letter-spacing: var(--tracking-body); color: var(--text-body); max-width: var(--measure-lead); margin: 0 0 14px; }
  p { font-size: var(--text-body); line-height: var(--leading-body); color: var(--text-secondary); max-width: var(--measure-body); margin: 0 0 12px; }
  small { font-size: var(--text-small); line-height: var(--leading-tight); color: var(--text-meta); display: block; max-width: var(--measure-body); }
</style>
</head>
<body>
<p class="lead">I design, build, and ship production agent systems for the enterprise.</p>
<p>Demos are easy. Production is the job. The gap between a promising agent and a dependable one is where I work.</p>
<small>Small text carries captions and footnotes. It never drops below 15px on desktop.</small>
</body>
</html>
