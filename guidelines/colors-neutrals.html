<!-- @dsCard group="Colors" viewport="700x170" name="Ink and paper" subtitle="Warm neutral ramp, the default palette" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; }
  .swatches { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; }
  .sw { height: 76px; border-radius: var(--radius-sm); border: 1px solid var(--border-hairline); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; color: var(--text-meta); margin-top: 6px; display: block; text-transform: uppercase; }
</style>
</head>
<body>
<div class="swatches">
  <div><div class="sw" style="background: var(--paper-0);"></div><span class="lbl">paper-0</span></div>
  <div><div class="sw" style="background: var(--paper-1);"></div><span class="lbl">paper-1</span></div>
  <div><div class="sw" style="background: var(--paper-2);"></div><span class="lbl">paper-2</span></div>
  <div><div class="sw" style="background: var(--line-1);"></div><span class="lbl">line-1</span></div>
  <div><div class="sw" style="background: var(--line-2);"></div><span class="lbl">line-2</span></div>
  <div><div class="sw" style="background: var(--ink-300);"></div><span class="lbl">ink-300</span></div>
  <div><div class="sw" style="background: var(--ink-500);"></div><span class="lbl">ink-500</span></div>
  <div><div class="sw" style="background: var(--ink-700);"></div><span class="lbl">ink-700</span></div>
  <div><div class="sw" style="background: var(--ink-900);"></div><span class="lbl">ink-900</span></div>
</div>
</body>
</html>
