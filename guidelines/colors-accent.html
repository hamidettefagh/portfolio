<!-- @dsCard group="Colors" viewport="700x170" name="Accent" subtitle="Burnt orange, one accent per view, plus the live dot" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; }
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { height: 76px; border-radius: var(--radius-sm); border: 1px solid var(--border-hairline); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; color: var(--text-meta); margin-top: 6px; display: block; text-transform: uppercase; }
</style>
</head>
<body>
<div class="swatches">
  <div><div class="sw" style="background: var(--accent-050);"></div><span class="lbl">accent-050</span></div>
  <div><div class="sw" style="background: var(--accent-100);"></div><span class="lbl">accent-100</span></div>
  <div><div class="sw" style="background: var(--accent-500);"></div><span class="lbl">accent-500</span></div>
  <div><div class="sw" style="background: var(--accent-600);"></div><span class="lbl">accent-600</span></div>
  <div><div class="sw" style="background: var(--accent-700);"></div><span class="lbl">accent-700</span></div>
  <div><div class="sw" style="background: var(--live);"></div><span class="lbl">live</span></div>
</div>
</body>
</html>
