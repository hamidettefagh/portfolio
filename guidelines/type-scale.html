<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 14px 24px; }
  .row { display: grid; grid-template-columns: 118px 1fr; align-items: baseline; gap: 18px; padding: 9px 0; border-bottom: 1px solid var(--border-hairline); }
  .row:last-child { border-bottom: none; }
  .k { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.05em; color: var(--text-meta); text-transform: uppercase; }
  .v { font-family: var(--font-display); color: var(--text-body); white-space: nowrap; overflow: hidden; }
</style>
</head>
<body>
<div class="row"><span class="k">hero &middot; 112</span><span class="v" style="font-size: 52px; font-weight: 700; letter-spacing: var(--tracking-display); line-height: 1;">Agents that ship</span></div>
<div class="row"><span class="k">h2 &middot; 54</span><span class="v" style="font-size: 38px; font-weight: 700; letter-spacing: var(--tracking-heading); line-height: 1.05;">Selected work</span></div>
<div class="row"><span class="k">h3 &middot; 26</span><span class="v" style="font-size: 26px; font-weight: 600; letter-spacing: var(--tracking-heading);">Airline super agent program</span></div>
<div class="row"><span class="k">lead &middot; 21</span><span class="v" style="font-size: 21px; font-weight: 400; font-family: var(--font-body);">Production agent systems for the enterprise</span></div>
<div class="row"><span class="k">body &middot; 17</span><span class="v" style="font-size: 17px; font-weight: 400; font-family: var(--font-body);">Demos are easy. Production is the job.</span></div>
<div class="row"><span class="k">small &middot; 15</span><span class="v" style="font-size: 15px; font-family: var(--font-body); color: var(--text-secondary);">Captions and footnotes</span></div>
<div class="row"><span class="k">mono &middot; 13</span><span class="v" style="font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-meta);">Meta labels and tickers</span></div>
</body>
</html>
